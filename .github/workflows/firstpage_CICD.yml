name: firstpage_CICD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DOCKER_IMAGE: firstpage
  DOCKER_TAG: v2

jobs:
  firstpage_tests:
    runs-on: ubuntu-latest  
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.9
        uses: actions/setup-python@v2
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run firstpage tests
        run: |
          pytest first_page_test.py

  docker_build:
    runs-on: ubuntu-latest
    needs: firstpage_tests
    steps:
      - uses: actions/checkout@v2
      - name: Build Docker image
        run: |
          docker build -t firstpage .
      - name: Push Docker image to registry
        run: |
          docker login -u DOCKER_USERNAME -p DOCKER_PASSWORD
          docker tag DOCKER_IMAGE:DOCKER_TAG fuyiran111/DOCKER_IMAGE:DOCKER_TAG
          docker push fuyiran111/DOCKER_IMAGE:DOCKER_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_KEY }}" > ~/.ssh/CICD-RSA.pem
          chmod 600 ~/.ssh/CICD-RSA.pem
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/CICD-RSA.pem ubuntu@18.166.249.157 "
          sudo docker ps -aq | xargs -r sudo ocker rm -f && 
          sudo docker run -d -p 8080:8080 fuyiran111/firstpage:latest"